app = "nanobot-pixan"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.fly"

[env]
  CONFIG_PATH = "/data/.nanobot/config.json"

[http_service]
  internal_port = 18790
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1

[mounts]
  source = "nanobot_data"
  destination = "/data"

[processes]
  app = "/entrypoint.sh nanobot gateway"
