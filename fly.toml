app = "nanobot-pixan"
primary_region = "mia"

[build]
  dockerfile = "Dockerfile.fly"

[env]
  # Config will be created from secrets at runtime
  CONFIG_PATH = "/root/.nanobot/config.json"

[http_service]
  internal_port = 18790
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
